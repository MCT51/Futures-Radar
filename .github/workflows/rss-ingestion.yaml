name: rss-ingestion

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Manual triggering

permissions:
  contents: write

jobs:
  ingest-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSS ingestion
        run: |
          python3 Wordcloud/wordcloud/bbc_inclusion_signals.py --term-mode baseline

      - name: Create article text files
        run: |
          python3 Wordcloud/wordcloud/article_to_text.py

      - name: Run sentiment analysis
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          python3 Sentiment/sentiment.py

      - name: Insert sentiment results into database
        run: |
          python3 Wordcloud/wordcloud/sentiment_insertion.py

      - name: Run cleanup script
        run: |
          python3 Sentiment/cleanup.py

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add .
          git diff --cached --quiet || git commit -m "update data [skip ci]"
          git push
