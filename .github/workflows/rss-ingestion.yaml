name: rss-ingestion

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: #  manual triggering of the workflow

permissions:
  contents: write

jobs:
  ingest-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run RSS ingestion 
        run: |
          python3 Qingyu/qingyu/bbc_inclusion_signals.py --term-mode baseline
          
      - name: create article text files
        run: |
          python3 Qingyu/qingyu/article_to_text.py

      - name: run sentiment analysis 
        run: |
          python3 Sentiment/sentiment.py

      - name: insert sentiment results into database
        run: |
          python3 Qingyu/qingyu/sentiment_insertion.py

      - name: run cleanup script
        run: |
          python3 Sentiment/cleanup.py

      - name: Commit and push changes
        run: |
          git config user.name '<github-actions>'
          git config user.email '<github-actions@github.com>'
          git add .
          git commit -m "update data"
          git push